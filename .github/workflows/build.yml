name: build

# G5 prep: build the GDExtension for the three desktop platforms on every
# push. We compile libturi.a from the sibling turmeric repo first (the
# GDExtension statically links it) and then drive the standard godot-cpp
# SCons setup for each (platform, arch) target.
#
# Per-platform binaries land under examples/spike/bin/ and are uploaded
# as workflow artifacts so a reviewer can grab a build off any commit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TURMERIC_REPO: https://github.com/rjungemann/turmeric.git

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,      platform: macos,   arch: arm64,  lib_suffix: framework }
          - { os: ubuntu-22.04,  platform: linux,   arch: x86_64, lib_suffix: so }
          - { os: windows-2022,  platform: windows, arch: x86_64, lib_suffix: dll }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout turmeric-godot (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout sibling turmeric
        uses: actions/checkout@v4
        with:
          repository: rjungemann/turmeric
          path: ../turmeric

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SCons
        run: python -m pip install --upgrade scons

      # libturi.a comes from the sibling turmeric checkout. We build it
      # in Release because the GDExtension we ship is template_debug --
      # mixing a Debug libturi would pull in ASan and break the link.
      - name: Build libturi.a (macos/linux)
        if: matrix.platform != 'windows'
        working-directory: ../turmeric
        run: |
          cmake -S . -B build-rel -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build-rel --target libturi -j

      - name: Build libturi.a (windows)
        if: matrix.platform == 'windows'
        working-directory: ../turmeric
        run: |
          cmake -S . -B build-rel -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build-rel --target libturi --config Release -j

      - name: Build GDExtension (template_debug)
        run: python -m SCons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_debug -j2

      - name: Build GDExtension (template_release)
        run: python -m SCons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_release -j2

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: turmeric-godot-${{ matrix.platform }}-${{ matrix.arch }}
          path: examples/spike/bin/**
          if-no-files-found: error
          retention-days: 14
