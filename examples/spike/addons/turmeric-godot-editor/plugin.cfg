[plugin]

name="Turmeric (editor integration)"
description="Editor-side wiring for the turmeric-godot GDExtension. Registers TurmericEditorSyntaxHighlighter with the Script Editor so .tur files get syntax coloring. The language itself, completion, validate, and the script class come from the GDExtension; this addon is only the editor-only glue."
author="turmeric-godot"
version="0.1.0"
script="plugin.gd"
